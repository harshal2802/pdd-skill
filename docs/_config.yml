title: Prompt Driven Development
description: >-
  A practical framework for building with AI — treat prompts as first-class
  artifacts with versioned context, structured review, and evaluation.
url: "https://harshal2802.github.io"
baseurl: "/pdd-skill"

remote_theme: pages-themes/minimal@v0.2.0

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

# SEO defaults
author: Harshal
twitter:
  card: summary_large_image
social:
  name: Harshal
  links:
    - https://github.com/harshal2802

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      image: false

# Exclude non-page files within docs/
exclude:
  - migration.md
